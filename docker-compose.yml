version: '3.8'

services:
  ingress_engine:
    build: ./ingress
    # The server inside the container LISTENS on 0.0.0.0:8000
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"  # Exposes port 8000 on your machine to port 8000 inside the container
    environment:
      - APP_ENV=production
      - HOST_ADDRESS=0.0.0.0

  api_gateway:
    build: ./gateway
    ports:
      - "8001:8001"
    environment:
      # CRUCIAL: The client must point to the specific destination address
      - INGRESS_URL=http://ingress_engine:8000/v1/invoices
    depends_on:
      - ingress_engine